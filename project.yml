name: PulseTimer
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PulseTimer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseTimer
        excludes:
          - "README.md"
          - "Resources/*.mp3"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.PulseTimer
        INFOPLIST_FILE: PulseTimer/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PulseTimer/PulseTimer.entitlements
    info:
      path: PulseTimer/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIBackgroundModes:
          - audio
        NSUserNotificationsUsageDescription: "PulseTimer sends interval alerts to your lock screen so you know when to switch exercises."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
